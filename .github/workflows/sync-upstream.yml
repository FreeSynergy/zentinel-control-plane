name: Sync Upstream

on:
  schedule:
    - cron: '0 4 * * 0'  # weekly on Sunday at 04:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/zentinelproxy/zentinel-control-plane.git
          git fetch upstream main

      - name: Merge upstream
        run: |
          git config user.name "FreeSynergy Bot"
          git config user.email "bot@freesynergy.net"
          git merge upstream/main --no-edit --allow-unrelated-histories -X theirs

      - name: Push to fork
        run: git push origin main
